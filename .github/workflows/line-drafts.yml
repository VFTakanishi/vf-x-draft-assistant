name: LINE Draft Delivery

on:
  schedule:
    - cron: "45,50,55 21 * * *"
    - cron: "0 22 * * *"
    - cron: "45,50,55 2 * * *"
    - cron: "0 3 * * *"
    - cron: "45,50,55 8 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Send a specific slot"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - noon
          - evening

jobs:
  send-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Send morning draft
        if: ${{ github.event_name == 'schedule' && (github.event.schedule == '45,50,55 21 * * *' || github.event.schedule == '0 22 * * *') }}
        run: node cloud-run.mjs --slot morning

      - name: Send noon draft
        if: ${{ github.event_name == 'schedule' && (github.event.schedule == '45,50,55 2 * * *' || github.event.schedule == '0 3 * * *') }}
        run: node cloud-run.mjs --slot noon

      - name: Send evening draft
        if: ${{ github.event_name == 'schedule' && (github.event.schedule == '45,50,55 8 * * *' || github.event.schedule == '0 9 * * *') }}
        run: node cloud-run.mjs --slot evening

      - name: Send selected slot
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: node cloud-run.mjs --slot "${{ github.event.inputs.slot }}"
