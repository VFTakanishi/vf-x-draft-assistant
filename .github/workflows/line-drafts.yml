name: LINE Draft Delivery

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Send a specific slot"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - noon
          - evening

jobs:
  send-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Send scheduled draft
        if: ${{ github.event_name == 'schedule' }}
        run: node cloud-run.mjs

      - name: Send selected slot
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: node cloud-run.mjs --slot "${{ github.event.inputs.slot }}"
